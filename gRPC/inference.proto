syntax = "proto3"; 

package inference; 

message InferRequest { 
    repeated float data = 1; 
}

message InferResponse { 
    repeated float logits = 1; 
    int32 predicted_classes = 2;
}

service InferenceService { 
    rpc Infer (InferRequest) returns (InferResponse); // one RPC method: takes InferRequest, returns InferResponse
}



