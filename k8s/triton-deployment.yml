apiVersion: apps/v1
kind: Deployment
metadata:
  name: triton

spec:
  replicas: 2

  selector:
    matchLabels:
      app: triton

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: triton
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"

    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: triton
              topologyKey: kubernetes.io/hostname

      imagePullSecrets:
        - name: ecr-pull-secret

      initContainers:
        - name: download-model
          image: amazon/aws-cli:latest
          command:
            - sh
            - -c
            - |
              mkdir -p /models/vit_int8/1
              aws s3 cp s3://${BUCKET_NAME}/triton_models/vit_int8/1/model.onnx \
                /models/vit_int8/1/model.onnx
              aws s3 cp s3://${BUCKET_NAME}/triton_models/vit_int8/config.pbtxt \
                /models/vit_int8/config.pbtxt
          env:
            - name: BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: aws-secrets
                  key: bucket_name
          volumeMounts:
            - name: model-store
              mountPath: /models

      containers:
        - name: triton
          image: nvcr.io/nvidia/tritonserver:26.02-py3
          imagePullPolicy: IfNotPresent

          args:
            - tritonserver
            - --model-repository=/models
            - --log-verbose=1

          ports:
            - containerPort: 8000
              name: http
            - containerPort: 8001
              name: grpc
            - containerPort: 8002
              name: metrics

          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"

          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 5
            failureThreshold: 5

          livenessProbe:
            httpGet:
              path: /v2/health/live
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 3

          volumeMounts:
            - name: model-store
              mountPath: /models

      volumes:
        - name: model-store
          emptyDir: {}