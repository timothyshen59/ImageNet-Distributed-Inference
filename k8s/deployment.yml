apiVersion: apps/v1
kind: Deployment 
metadata: 
  name: inference 

spec: 
  replicas: 2 

  selector: 
    matchLabels:
      app: inference 
  
  template:
    metadata: 
      labels: 
        app: inference 
      annotations: 
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"

    spec: 
      containers: 
        - name: inference 
          image: distributedinference:latest
          imagePullPolicy: Never 

          ports: 
            - containerPort: 8000
            - containerPort: 50051 
          
          resources: 
            requests: 
              cpu: "500m"
              memory: "512Mi"
            limits: 
              cpu: "1000m"
              memory: "1Gi"

          readinessProbe: 
            httpGet: 
              path: /health
              port: 8000
            initialDelaySeconds: 10 
            periodSeconds: 5 
          
          livenessProbe: 
            httpGet: 
              path: /health 
              port: 8000
            initialDelaySeconds: 15 
            periodSeconds: 10 
